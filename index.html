<html>
<link href="https://googleapis.com" rel="stylesheet">
	<head>
		<meta charset='utf-8'>
		<title>SunwayConfessions</title>
		<link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    	<link rel="stylesheet" href="style.css">
	</head>

	<body style="font-family: helvetica neue; font-weight: light; height:100%">
	
		<div id="bar">
			<div style="font-size:40px; ">SunwayConfessions</div>
			<div id="about"><a href="https://xyrelium.com/about.html">About Us</a></div>
			<div align="center">
					<textarea id="confession_input" placeholder="Confess your spiciest secrets..."></textarea>
					<br>
					<br>
					<input id="post_button" type="submit" value="Confess!">
		</div>
	</div>
		<!--posts-->
		<div id="post_bar">
		<div id="posts_container"; align="center">
			<!--post 1-->
		
		
			<script type="module">
			  // Import the functions you need from the SDKs you need
			  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
			  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
			  import {
			    getFirestore,
			    collection,
			    addDoc,
			    getDocs
			  } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
			  // TODO: Add SDKs for Firebase products that you want to use
			  // https://firebase.google.com/docs/web/setup#available-libraries

			  // Your web app's Firebase configuration
			  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
			  const firebaseConfig = {
			    apiKey: "AIzaSyA61j3UdMHD4w86-yKA_lBGtlP--FZrMq4",
			    authDomain: "sunwayconfessions-d251b.firebaseapp.com",
			    projectId: "sunwayconfessions-d251b",
			    storageBucket: "sunwayconfessions-d251b.firebasestorage.app",
			    messagingSenderId: "575705908456",
			    appId: "1:575705908456:web:55b9f884dbae4f5fdc355d",
			    measurementId: "G-81RRQZ2YS5"
			  };

			  // Initialize Firebase
			  const app = initializeApp(firebaseConfig);
			  const db = getFirestore(app);
			  const analytics = getAnalytics(app);
			  const postButton = document.getElementById("post_button");
			  const confessionInput = document.getElementById("confession_input");
			  const postsContainer = document.getElementById("posts_container");


			  postButton.addEventListener("click", async () => {
				  event.preventDefault();
				  

			    const confession = confessionInput.value;

			    if(confession.trim() == ""){
			      return;
			    }

			    await addDoc(collection(db, "posts"), {

			      text: confession,
			      date: new Date()

			    });

			    confessionInput.value = "";

			 loadPosts();
	
				async function loadPosts(){

				  postsContainer.innerHTML = "";

				  const querySnapshot = await getDocs(collection(db, "posts"));

				  querySnapshot.forEach((doc) => {

				    const post = doc.data();

				    postsContainer.innerHTML += `

				      <div class="post">

				        <div style="font-weight:bold;color:gray;">
				          Anonymous
				        </div>

				        <br>

				        ${post.text}

				      </div>

				    `;

				  });

				}

				loadPosts();

			  });
			</script>
	</body>



</html>
